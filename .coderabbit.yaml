# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: en-US
early_access: false
enable_free_tier: true
tone_instructions: Be direct and technical. Flag bugs, security issues, and FP/standards violations only. Skip style, subjective suggestions, and pre-existing issues. oxlint and oxfmt already enforce formatting and most lint rules — don't restate what they catch.

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: false
  poem: false
  review_status: true
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: false
  related_issues: true
  related_prs: true
  suggested_labels: false
  suggested_reviewers: false
  in_progress_fortune: false
  enable_prompt_for_ai_agents: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - '.*'
    ignore_title_keywords:
      - 'WIP'
      - 'DO NOT MERGE'

  path_filters:
    # Tool/build noise
    - '!**/node_modules/**'
    - '!**/dist/**'
    - '!**/.turbo/**'
    - '!**/coverage/**'
    - '!**/*.d.ts'
    - '!**/*.tsbuildinfo'
    - '!**/.cache/**'
    - '!**/.gg/**'
    - '!**/.claude/**'
    - '!**/.serena/**'

    # Generated by scripts/docs-sync.mjs — verbatim mirror of upstream
    # es-toolkit docs. Editing them by hand is caught by `pnpm docs:sync:check`
    # in validate; CodeRabbit reviewing 181 upstream-owned pages would be noise.
    - '!docs/reference/array/**'
    - '!docs/reference/object/**'
    - '!docs/reference/function/**'
    - '!docs/reference/math/**'
    - '!docs/reference/string/**'
    - '!docs/reference/promise/**'
    - '!docs/reference/error/**'
    - '!docs/reference/predicate/**'
    - '!docs/_meta/proxies.json'

    # Auto-generated changelog entries (changesets writes these)
    - '!**/CHANGELOG.md'

  path_instructions:
    - path: '**'
      instructions: |
        ## Review Standards
        Search AGENTS.md and packages/massaman/CLAUDE.md for repo conventions before reviewing.
        Key sources of truth:
        - AGENTS.md — full FP persona, boundaries (Always / Never / Ask First), commit conventions, hooks
        - .oxlintrc.json — lint rules (functional/no-let, no-ternary, no-explicit-any, etc.)
        - commit-conventions.json — allowed commit types and scopes
        - packages/massaman/vitest.config.ts — 100% coverage thresholds

        ## High Signal Only
        Only flag issues that meet one of:
        - Code will fail or produce wrong results at runtime (concrete bug)
        - Security vulnerability with concrete exploit path
        - Documented FP/standards violation not already caught by oxlint
        - Breaking change without changeset or migration note
        - Test coverage gap that would drop below 100%

        Do NOT flag:
        - Formatting (oxfmt handles this)
        - Lint rules already enforced by oxlint
        - Subjective improvements ("you could also…")
        - Pre-existing issues not introduced in this PR
        - Style of code in scripts/** (imperative scripts have a relaxed oxlint override)

    - path: 'packages/massaman/src/**/*.ts'
      instructions: |
        ## Library code — FP-strict
        This is the published surface. AGENTS.md defines the boundaries; flag the following as bugs:

        - `class` declarations — use factory function + closure
        - `let` outside test files — use `const` + transformation
        - `throw` across an exported boundary — return a `Result` via `attempt` / `err`
        - `switch` statements or nested ternaries — use `ts-pattern`'s `match()`
        - `for` / `while` / `forEach` for transformation — use `map` / `filter` / `reduce`
        - `any` — use `unknown` with a guard or proper generics
        - Non-null assertions (`x!`) — narrow with a guard or `match`
        - Mutation of function parameters or shared state
        - New public export without a colocated `.test.ts` (vitest requires 100% coverage)
        - `eval`, non-literal `RegExp(...)`, or `child_process` with non-literal input

        ## Subpath consistency
        massaman ships subpaths declared in three places. If a PR adds an export, verify it's wired in all three:
        1. `packages/massaman/src/<area>/index.ts` (re-export)
        2. `packages/massaman/package.json` `exports` field
        3. `packages/massaman/tsdown.config.ts` `entry` array

        Flag any drift between these three.

        ## Re-export from es-toolkit
        Most of `array`, `object`, `string`, `function`, `math`, `promise`, `error`, and parts of `predicate` are pass-through re-exports from `es-toolkit/<area>`. Don't reimplement what es-toolkit already provides — flag a new local function if an es-toolkit equivalent exists.

    - path: 'packages/massaman/src/**/*.test.ts'
      instructions: |
        ## Runtime tests (vitest)
        - 100% coverage is enforced by vitest.config.ts (statements/branches/functions/lines)
        - `let` and conditional expectations ARE allowed in tests (functional rules off via override)

        Flag:
        - `it.skip` / `describe.skip` / `it.only` / `describe.only` left in
        - Mocking `massaman/control`'s `Result` constructors (defeats their purpose — call the real functions)
        - Tests that don't actually assert (`expect` missing)
        - Missing coverage for both `Ok` and `Err` branches of a `Result` API
        - Brittle assertions on error `.message` strings without `.cause` inspection

    - path: 'packages/massaman/src/**/*.test-d.ts'
      instructions: |
        ## Type-level tests (vitest typecheck)
        Use `expectTypeOf` from vitest. These run as part of `pnpm test` via the `typecheck.include` glob in vitest.config.ts.

        Flag:
        - Use of `any` or non-null assertions to "pass" a type assertion
        - `const result: Result<T> = ok(...)` patterns inside tests that exercise `match()` — vitest's strict typecheck narrows the variable to the assigned variant, collapsing the remaining input to `never` after the first arm. Use a function parameter (`function check(result: Result<T>) { ... }`) instead.

    - path: 'packages/massaman/package.json'
      instructions: |
        ## Public surface change
        Any change to the `exports` field is a public-API change. Verify:
        - Matching entry exists in `tsdown.config.ts`
        - Subpath has an `index.ts` under `src/`
        - A changeset exists in `.changeset/` describing the change

        ## Dependency review
        - Pre-1.0 caps breaking changes at `minor`. Flag a `major` changeset.
        - `es-toolkit` and `ts-pattern` are pinned via `catalog:` in `pnpm-workspace.yaml`. Direct version bumps here are a smell.

    - path: '.changeset/*.md'
      instructions: |
        ## Changeset review
        Pre-1.0 contract (until massaman hits 1.0):
        - `patch` — bug fixes, additive non-breaking changes
        - `minor` — anything that could surprise existing users (rename, signature change, removed export). After 1.0 these will become `major`.
        - `major` — reserved for the 1.0 release itself

        Flag:
        - A `major` bump pre-1.0
        - A user-visible change to `packages/massaman/src/**` without a changeset
        - A changeset whose description doesn't match the actual diff
        - Multiple unrelated bumps in one changeset (one user-visible change per changeset)

    - path: 'packages/massaman/tsdown.config.ts'
      instructions: |
        Build config. Every `entry` here must have a matching `exports` declaration in `package.json` and an `index.ts` under `src/`. Flag drift.

    - path: 'packages/massaman/vitest.config.ts'
      instructions: |
        Test config. The `coverage.thresholds` (100% across statements/branches/functions/lines) are deliberate — flag any attempt to lower them.

    - path: '**/pnpm-lock.yaml'
      instructions: |
        ## Lockfile review
        - Verify lockfile changes match `package.json` / `pnpm-workspace.yaml` changes
        - Flag unexpected transitive dependency changes
        - Catalog deps (`es-toolkit`, `ts-pattern`, etc.) come from `pnpm-workspace.yaml` — flag if they're bumped in a package directly

    - path: 'scripts/**/*.{mjs,ts,js}'
      instructions: |
        ## Dev scripts (imperative)
        Scripts use `zx` and have an oxlint override relaxing functional rules — `let`, ternaries, sequential awaits in a loop are fine here.

        Flag:
        - Hardcoded absolute paths (use `path.resolve(__dirname, ...)`)
        - Side effects at module top level beyond the script's purpose
        - Writes outside the repo root or `node_modules/.cache/`
        - Shelling out without quoting via zx's tagged template (raw `child_process` calls)
        - Network requests without the pinned upstream version from `docs/_meta/upstream-versions.json`

    - path: '.github/workflows/**'
      instructions: |
        ## CI workflows
        - Pin action versions to a SHA or release tag — never `@main`
        - Don't expose secrets to PR builds from forks
        - The `validate` job must run typecheck, test, lint, format:check, and docs:sync:check (these are the same gates locally)

    - path: '**/*.ts'
      instructions: |
        ## TypeScript / FP patterns
        - Use `ts-pattern`'s `match()` for conditional logic with 2+ branches instead of `switch` or `if`/`else if` chains
        - Prefer `.exhaustive()` over `.otherwise()` on closed unions — the compiler-level safety is the point
        - Use `Result<T>` (`attempt` / `attemptAsync`) for fallible operations; never throw across an exported boundary
        - Bridge predicates to `match` via `P.when(predicate)` when a structural pattern isn't a clean fit

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false

  tools:
    github-checks:
      enabled: true
      timeout_ms: 90000
    oxlint:
      enabled: true
    gitleaks:
      enabled: true
    actionlint:
      enabled: true
    shellcheck:
      enabled: true
    semgrep:
      enabled: true
    markdownlint:
      enabled: true
    languagetool:
      enabled: true

chat:
  auto_reply: true
  art: false

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
